    <title>TON Config Voting</title>
    <style>
      :root {
        --bg: #f4f0e8;
        --bg-strong: #e8dfcf;
        --card: rgba(255, 252, 246, 0.82);
        --card-strong: rgba(255, 248, 238, 0.94);
        --ink: #1d1a17;
        --muted: #62584f;
        --line: rgba(29, 26, 23, 0.12);
        --accent: #0c7c59;
        --accent-soft: rgba(12, 124, 89, 0.14);
        --warn: #a44a3f;
        --critical: #912d1f;
        --shadow: 0 20px 50px rgba(68, 46, 20, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(217, 191, 123, 0.4), transparent 34%),
          radial-gradient(circle at top right, rgba(12, 124, 89, 0.16), transparent 26%),
          linear-gradient(180deg, #fbf7ef 0%, var(--bg) 100%);
        min-height: 100vh;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(29, 26, 23, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(29, 26, 23, 0.02) 1px, transparent 1px);
        background-size: 22px 22px;
        pointer-events: none;
        opacity: 0.45;
      }

      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 32px 20px 72px;
        position: relative;
      }

      .hero,
      .proposal,
      .empty,
      .error {
        backdrop-filter: blur(10px);
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 28px;
        box-shadow: var(--shadow);
      }

      .hero {
        padding: 28px;
        position: relative;
        overflow: hidden;
      }

      .hero::after {
        content: "";
        position: absolute;
        width: 220px;
        height: 220px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(12, 124, 89, 0.18), transparent 70%);
        top: -70px;
        right: -50px;
        pointer-events: none;
      }

      .hero-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        position: relative;
        z-index: 1;
      }

      .eyebrow {
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--muted);
        margin: 0 0 8px;
      }

      h1,
      h2,
      h3 {
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
        margin: 0;
        font-weight: 600;
        line-height: 0.96;
      }

      h1 {
        font-size: clamp(2.5rem, 8vw, 5rem);
        max-width: 10ch;
      }

      .hero-copy {
        max-width: 64ch;
        margin-top: 16px;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.6;
      }

      .stats {
        margin-top: 28px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 14px;
      }

      .stat {
        padding: 16px 18px;
        border-radius: 20px;
        background: var(--card-strong);
        border: 1px solid rgba(29, 26, 23, 0.08);
      }

      .stat-label {
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .stat-value {
        display: block;
        font-size: 1.7rem;
        margin-top: 8px;
        line-height: 1.05;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px 16px;
        margin-top: 18px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .proposal > .meta > span {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        line-height: 1.2;
      }

      .meta-link {
        color: #2296f3;
        text-decoration: none;
      }

      .meta-link:hover {
        text-decoration: underline;
      }

      .actions {
        margin-top: 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      button,
      a.button-link {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font: inherit;
        font-weight: 600;
        text-decoration: none;
        color: var(--ink);
        background: #fdf9f0;
        border: 1px solid rgba(29, 26, 23, 0.12);
        cursor: pointer;
        transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
      }

      button:hover,
      a.button-link:hover {
        transform: translateY(-1px);
        background: white;
      }

      .button-primary {
        background: var(--accent);
        color: white;
        border-color: transparent;
      }

      .button-primary:hover {
        background: #0a694b;
      }

      .copy-hash {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 7px 12px;
        border-radius: 999px;
        border: 1px solid rgba(29, 26, 23, 0.12);
        background: rgba(255, 255, 255, 0.68);
        color: var(--ink);
        line-height: 1.2;
      }

      .copy-hash:hover {
        background: white;
      }

      .copy-hash.copied {
        border-color: rgba(12, 124, 89, 0.28);
        background: rgba(12, 124, 89, 0.12);
      }

      .copy-label {
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--muted);
      }

      .made-by {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid rgba(29, 26, 23, 0.12);
        background: rgba(255, 255, 255, 0.58);
        color: var(--muted);
        text-decoration: none;
        white-space: nowrap;
        transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
        position: relative;
        z-index: 1;
      }

      .made-by:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.86);
      }

      .made-by strong {
        color: var(--ink);
        font-weight: 600;
      }

      .telegram-icon {
        width: 18px;
        height: 18px;
        flex: 0 0 auto;
        color: #229ed9;
      }

      .section {
        margin-top: 26px;
      }

      .section-title {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 12px;
        margin-bottom: 14px;
      }

      .section-title p {
        margin: 0;
        color: var(--muted);
      }

      .proposal-list {
        display: grid;
        gap: 18px;
      }

      .proposal {
        padding: 24px;
        transform: translateY(14px);
        opacity: 0;
        animation: rise 420ms ease forwards;
      }

      .proposal:nth-child(2) {
        animation-delay: 80ms;
      }

      .proposal:nth-child(3) {
        animation-delay: 160ms;
      }

      @keyframes rise {
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .proposal-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
      }

      .proposal-head > .chips {
        justify-content: flex-end;
        margin-top: 8px;
        max-width: 50%;
      }

      .proposal-title {
        font-size: clamp(1.6rem, 4vw, 2.4rem);
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 14px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        padding: 7px 12px;
        font-size: 0.88rem;
        background: rgba(29, 26, 23, 0.06);
        color: var(--muted);
        text-decoration: none;
      }

      .chip.critical {
        background: rgba(145, 45, 31, 0.12);
        color: var(--critical);
      }

      .chip.good {
        background: var(--accent-soft);
        color: var(--accent);
      }

      .chip.mtonga {
        background: var(--accent-soft);
        border: 1px solid rgba(12, 124, 89, 0.28);
        color: var(--accent);
        font-weight: 600;
        text-decoration: underline;
        text-decoration-thickness: 1px;
        text-underline-offset: 3px;
      }

      .chip.mtonga::after {
        content: "↗";
        font-size: 0.78em;
        line-height: 1;
      }

      .chip.mtonga:hover {
        background: rgba(12, 124, 89, 0.2);
        border-color: rgba(12, 124, 89, 0.42);
      }

      .chip.independent {
        background: rgba(145, 45, 31, 0.12);
        color: var(--critical);
      }

      .summary {
        margin: 18px 0 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .progress-panel {
        margin-top: 22px;
        padding: 18px;
        border-radius: 22px;
        background: var(--card-strong);
        border: 1px solid rgba(29, 26, 23, 0.08);
      }

      .progress-top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: baseline;
        margin-bottom: 12px;
      }

      .progress-top strong {
        font-size: 1.2rem;
      }

      .progress-track {
        position: relative;
        height: 16px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(29, 26, 23, 0.08);
      }

      .progress-fill {
        position: relative;
        z-index: 1;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #0c7c59 0%, #d28f35 100%);
        transition: width 240ms ease;
      }

      .progress-threshold {
        position: absolute;
        left: 75%;
        top: -6px;
        bottom: -6px;
        width: 2px;
        border-radius: 999px;
        background: rgba(29, 26, 23, 0.45);
        z-index: 2;
      }

      .progress-threshold-label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 10px;
        color: var(--muted);
        font-size: 0.84rem;
      }

      .progress-threshold-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: rgba(29, 26, 23, 0.45);
      }

      .metric-grid {
        margin-top: 18px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
      }

      .metric {
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(29, 26, 23, 0.035);
      }

      .metric span {
        display: block;
      }

      .metric .label {
        display: inline-flex;
        align-items: flex-start;
        gap: 6px;
        color: var(--muted);
        font-size: 0.82rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .info-dot {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 auto;
        width: 18px;
        height: 18px;
        margin-top: 1px;
        color: var(--muted);
        cursor: help;
      }

      .info-dot svg {
        display: block;
        width: 18px;
        height: 18px;
      }

      .info-dot::after {
        content: attr(data-tooltip);
        position: absolute;
        left: 50%;
        bottom: calc(100% + 8px);
        width: min(240px, 70vw);
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(29, 26, 23, 0.92);
        color: #fffaf2;
        font-size: 0.78rem;
        font-weight: 500;
        letter-spacing: 0;
        line-height: 1.35;
        opacity: 0;
        pointer-events: none;
        text-transform: none;
        transform: translate(-50%, 4px);
        transition: opacity 160ms ease, transform 160ms ease;
        z-index: 5;
      }

      .info-dot:hover::after,
      .info-dot:focus-visible::after {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      .metric .value {
        margin-top: 8px;
        font-size: 1.22rem;
      }

      .change-grid {
        margin-top: 20px;
        display: grid;
        gap: 10px;
      }

      .change-row {
        display: grid;
        grid-template-columns: minmax(120px, 180px) 1fr 1fr;
        gap: 10px;
        padding: 14px;
        border-radius: 18px;
        background: rgba(29, 26, 23, 0.035);
        border: 1px solid rgba(29, 26, 23, 0.06);
      }

      .change-row strong {
        font-size: 0.92rem;
      }

      .change-label {
        color: var(--muted);
      }

      .change-box {
        padding: 12px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.55);
        line-height: 1.5;
        white-space: pre-line;
      }

      .change-box.proposed {
        background: rgba(12, 124, 89, 0.08);
      }

      .empty,
      .error {
        padding: 22px;
        color: var(--muted);
      }

      .empty h3 {
        margin: 0 0 10px;
        font-size: 1.6rem;
        color: var(--ink);
      }

      .empty p {
        margin: 0;
        line-height: 1.7;
      }

      .empty-grid {
        margin-top: 18px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
      }

      .empty-metric {
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(29, 26, 23, 0.035);
      }

      .empty-metric span {
        display: block;
      }

      .empty-metric .label {
        color: var(--muted);
        font-size: 0.82rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .empty-metric .value {
        margin-top: 8px;
        font-size: 1.1rem;
        color: var(--ink);
      }

      .resolved-card {
        margin-top: 18px;
        padding: 18px;
        border-radius: 22px;
        background: rgba(12, 124, 89, 0.08);
        border: 1px solid rgba(12, 124, 89, 0.16);
      }

      .resolved-card h4 {
        margin: 10px 0 0;
        font-size: 1.2rem;
        color: var(--ink);
      }

      .resolved-card p + p {
        margin-top: 10px;
      }

      .footer {
        margin-top: 20px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .mono {
        font-family: "SFMono-Regular", "JetBrains Mono", "Menlo", monospace;
        font-size: 0.92em;
      }

      @media (max-width: 760px) {
        main {
          padding: 18px 14px 48px;
        }

        .hero,
        .proposal,
        .empty,
        .error {
          border-radius: 22px;
        }

        .change-row {
          grid-template-columns: 1fr;
        }

        .proposal-head,
        .progress-top,
        .section-title {
          flex-direction: column;
          align-items: flex-start;
        }

        .proposal-head > .chips {
          justify-content: flex-start;
          max-width: none;
        }

        .hero-top {
          flex-direction: column;
        }

      }

        border-radius: 999px;
        background: var(--bg-strong);
        color: var(--accent);
        font-size: 14px;
        line-height: 20px;
      }

      .chip.good,
      .chip.mtonga {
        background: var(--accent-soft);
        color: var(--accent);
      }

      .chip.critical,
      .chip.independent {
        background: #fff0ef;
        color: var(--critical);
      }

      .chip.mtonga {
        border: 0;
        font-weight: 700;
        text-decoration: none;
      }

      .chip.mtonga:hover {
        background: #d4eafa;
      }

      .summary {
        color: #333;
        font-size: 16px;
        line-height: 24px;
      }

      .progress-panel {
        margin: 24px;
        padding: 18px 16px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
      }

      .progress-top strong {
        color: var(--accent);
        font-size: 22px;
      }

      .progress-track {
        height: 18px;
        background: var(--bg-strong);
      }

      .progress-fill {
        background: #3ea6f0;
      }

      .progress-threshold {
        background: #697680;
      }

      .progress-threshold-label {
        color: var(--muted);
      }

      .progress-threshold-dot {
        background: #697680;
      }

      .metric-grid,
      .empty-grid {
        gap: 1px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--line);
      }

      .metric-grid {
        position: relative;
        z-index: 2;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        grid-auto-rows: minmax(86px, auto);
        overflow: hidden;
      }

      .metric-grid::after {
        content: "";
        display: block;
        background: #fff;
      }

      .metric-grid:has(.info-dot:hover),
      .metric-grid:has(.info-dot:focus-visible) {
        overflow: visible;
      }

      .empty-grid {
        overflow: hidden;
      }

      .metric {
        position: relative;
        padding: 12px 16px;
        border-radius: 0;
        background: #fff;
      }

      .metric .value,
      .empty-metric .value {
        color: #000;
        font-size: 18px;
        font-weight: 700;
        line-height: 23px;
      }

      .info-dot {
        color: var(--accent);
        z-index: 10;
      }

      .info-dot::after {
        border-radius: 8px;
        background: #2f3942;
        color: #fff;
        z-index: 999;
      }

      .change-grid {
        gap: 1px;
        margin: 24px;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--line);
      }

      .change-row {
        grid-template-columns: minmax(150px, 220px) 1fr 1fr;
        gap: 1px;
        padding: 0;
        border: 0;
        border-radius: 0;
        background: var(--line);
      }

      .change-label,
      .change-box {
        padding: 14px 16px;
        background: #fff;
      }

      .change-label {
        color: #333;
      }

      .change-box {
        border-radius: 0;
        color: #333;
      }

      .change-box.proposed {
        background: var(--accent-soft);
      }

      .copy-hash {
        min-height: 34px;
        padding: 6px 11px;
        border: 1px solid #cfe5f5;
        background: #fff;
        color: var(--accent);
      }

      .copy-hash:hover {
        background: var(--accent-soft);
      }

      .copy-hash.copied {
        border-color: #b9d9ee;
        background: var(--accent-soft);
      }

      .copy-label {
        color: var(--accent);
      }

      .empty,
      .error {
        padding: 22px 24px;
        border-radius: 12px;
        background: var(--bg-strong);
        color: #333;
      }

      .error {
        background: #fff0ef;
        color: var(--critical);
      }

      .empty h3 {
        font-size: 20px;
        line-height: 25px;
      }

      .empty-metric {
        padding: 14px 16px;
        border-radius: 0;
        background: #fff;
      }

      .resolved-card {
        margin-top: 0;
        padding: 24px 0 0;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
      }

      .resolved-card > .chips,
      .resolved-card > h4,
      .resolved-card > p,
      .resolved-card > .meta {
        padding-left: 24px;
        padding-right: 24px;
      }

      .resolved-card h4 {
        color: #000;
        font-size: 20px;
        line-height: 25px;
      }

      .resolved-card p {
        color: #333;
        font-size: 16px;
        line-height: 24px;
      }

      .footer {
        width: 100vw;
        margin: 60px 0 0 50%;
        padding: 34px max(15px, calc((100vw - 1170px) / 2 + 34px)) 44px;
        transform: translateX(-50%);
        background: var(--bg-strong);
        box-shadow: 0 -1px #e8e8e8;
        color: #333;
        font-size: 16px;
        line-height: 24px;
      }

      .mono {
        font-family: Menlo, Monaco, Consolas, "Courier New", monospace;
      }

      @media (max-width: 900px) {
        .stats {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .metric-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          grid-auto-rows: auto;
        }

        .metric-grid::after {
          content: none;
        }
      }

      @media (max-width: 760px) {
        body::after {
          height: 48px;
        }

        main {
          padding: 68px 0 0;
        }

        main::before {
          left: 16px;
          height: 48px;
        }

        .hero,
        .section {
          padding-left: 16px;
          padding-right: 16px;
        }

        .hero,
        .proposal,
        .empty,
        .error {
          border-radius: 0;
        }

        .proposal,
        .resolved-card {
          border-left: 0;
          border-right: 0;
        }

        .stats {
          grid-template-columns: 1fr;
        }

        .metric-grid {
          grid-template-columns: 1fr;
          grid-auto-rows: auto;
        }

        .stat {
          min-height: 0;
          padding: 22px 18px;
        }

        .proposal-head,
        .proposal > .chips,
        .proposal > .summary,
        .proposal > .meta,
        .resolved-card > .chips,
        .resolved-card > h4,
        .resolved-card > p,
        .resolved-card > .meta {
          padding-left: 16px;
          padding-right: 16px;
        }

        .proposal > .meta,
        .resolved-card > .meta {
          padding-bottom: 24px;
        }

        .progress-panel,
        .change-grid {
          margin-left: 16px;
          margin-right: 16px;
        }

        .change-row {
          grid-template-columns: 1fr;
        }

        .made-by {
          right: 8px;
          max-width: calc(100vw - 150px);
          overflow: hidden;
          text-overflow: ellipsis;
        }

        .footer {
          padding: 28px 16px 36px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <div class="hero-top">
          <div>
            <p class="eyebrow">TON Mainnet Governance</p>
            <h1>Config voting live</h1>
          </div>
          <a class="made-by" href="https://t.me/lagus_research" target="_blank" rel="noreferrer">
            <svg class="telegram-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="currentColor" d="M21.4 4.6a2 2 0 0 0-2.1-.3L3.8 10.7a1.5 1.5 0 0 0 .1 2.8l3.8 1.2 1.5 4.9a1.5 1.5 0 0 0 2.6.5l2.2-2.7 3.8 2.8a1.9 1.9 0 0 0 3-1.1l2.6-13a2 2 0 0 0-1-2.2Zm-3 2.7-8.2 7.3a1 1 0 0 0-.3.5l-.5 2.3-.9-3 9.9-8.1Zm-11 5.9-2.1-.7 11.7-5-9.6 5.7Zm12.1 5.8-4.7-3.5a1 1 0 0 0-1.4.2l-1.8 2.2.6-2.6 8-7.1Z"/>
            </svg>
            <span>made by <strong>@lagus_research</strong></span>
          </a>
        </div>
        <p class="hero-copy">
          This page reads the real mainnet config contract on every refresh and turns validator weight, rounds,
          and proposal payloads into plain English.
        </p>
        <div class="stats" id="hero-stats"></div>
        <div class="meta" id="hero-meta"></div>
        <div class="actions">
          <button class="button-primary" id="refresh-button" type="button">Refresh now</button>
          <a class="button-link" id="tonviewer-link" href="https://tonviewer.com/config" target="_blank" rel="noreferrer">Open tonviewer/config</a>
        </div>
      </section>

      <section class="section">
        <div class="section-title">
          <div>
            <h2>Active proposals</h2>
          </div>
          <p id="proposal-counter"></p>
        </div>
        <div id="status"></div>
        <div class="proposal-list" id="proposal-list"></div>
      </section>

      <section class="section">
        <div class="section-title">
          <div>
            <h2>Resolved proposals</h2>
          </div>
          <p id="resolved-counter"></p>
        </div>
        <div id="resolved-list"></div>
      </section>

      <p class="footer" id="footer-note"></p>
    </main>

    <script>
      const heroStats = document.getElementById('hero-stats');
      const heroMeta = document.getElementById('hero-meta');
      const proposalList = document.getElementById('proposal-list');
      const proposalCounter = document.getElementById('proposal-counter');
      const resolvedList = document.getElementById('resolved-list');
      const resolvedCounter = document.getElementById('resolved-counter');
      const statusNode = document.getElementById('status');
      const footerNote = document.getElementById('footer-note');
      const refreshButton = document.getElementById('refresh-button');
      const tonviewerLink = document.getElementById('tonviewer-link');
      const MTONGA_PLAN_URL = 'https://t.me/durov/482';
      const SNAPSHOT_STORAGE_KEY = 'ton-config-voting:last-snapshot:v7';
      const SNAPSHOT_MAX_AGE_MS = 5 * 60 * 1000;

      let refreshTimer = null;
      let loading = false;

      refreshButton.addEventListener('click', () => {
        loadSnapshot({ force: true });
      });

      proposalList.addEventListener('click', copyHashFromClick);
      resolvedList.addEventListener('click', copyHashFromClick);

      async function copyHashFromClick(event) {
        const target = event.target instanceof Element ? event.target : null;
        const button = target ? target.closest('.copy-hash') : null;
        if (!button) {
          return;
        }

        const value = button.dataset.copyValue;
        if (!value) {
          return;
        }

        const copied = await copyText(value);
        if (!copied) {
          return;
        }

        const label = button.querySelector('.copy-label');
        const previous = label ? label.textContent : '';
        button.classList.add('copied');
        if (label) {
          label.textContent = 'Copied';
        }

        window.setTimeout(() => {
          button.classList.remove('copied');
          if (label) {
            label.textContent = previous || 'Copy';
          }
        }, 1200);
      }

      start();

      function start() {
        const cached = readStoredSnapshot();
        if (cached) {
          renderSnapshot(cached.snapshot);
          if (!isStoredSnapshotExpired(cached)) {
            refreshTimer = window.setInterval(loadSnapshot, 30000);
            return;
          }
        }

        loadSnapshot();
        refreshTimer = window.setInterval(loadSnapshot, 30000);
      }

      async function loadSnapshot(options = {}) {
        const force = options.force === true;
        const cached = readStoredSnapshot();

        if (!force && cached && !isStoredSnapshotExpired(cached)) {
          renderSnapshot(cached.snapshot);
          return;
        }

        if (loading) {
          return;
        }
        loading = true;
        if (cached) {
          renderSnapshot(cached.snapshot);
          setStatus('Refreshing live mainnet data…', 'empty');
        } else {
          setStatus('Loading live mainnet data…', 'empty');
        }

        try {
          const response = await fetch('/api/status', { cache: 'no-store' });
          const payload = await response.json();

          if (!response.ok) {
            throw new Error(payload.error || 'Failed to load voting status');
          }

          writeStoredSnapshot(payload);
          renderSnapshot(payload);
        } catch (error) {
          if (cached) {
            renderSnapshot(cached.snapshot);
            setStatus('Showing saved data; live refresh failed.', 'empty');
          } else {
            setStatus(error.message || 'Failed to load live data', 'error');
            heroStats.innerHTML = '';
            heroMeta.innerHTML = '';
            proposalList.innerHTML = '';
            proposalCounter.textContent = '';
            resolvedList.innerHTML = '';
            resolvedCounter.textContent = '';
            footerNote.textContent = 'The page could not reach the live mainnet data source.';
          }
        } finally {
          loading = false;
        }
      }

      function readStoredSnapshot() {
        try {
          const raw = window.localStorage.getItem(SNAPSHOT_STORAGE_KEY);
          if (!raw) {
            return null;
          }

          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed.savedAt !== 'number' || !parsed.snapshot || typeof parsed.snapshot !== 'object') {
            window.localStorage.removeItem(SNAPSHOT_STORAGE_KEY);
            return null;
          }

          return parsed;
        } catch (error) {
          return null;
        }
      }

      function writeStoredSnapshot(snapshot) {
        try {
          window.localStorage.setItem(SNAPSHOT_STORAGE_KEY, JSON.stringify({
            savedAt: Date.now(),
            snapshot,
          }));
        } catch (error) {
        }
      }

      function isStoredSnapshotExpired(entry) {
        return Date.now() - getStoredSnapshotTimestamp(entry) > SNAPSHOT_MAX_AGE_MS;
      }

      function getStoredSnapshotTimestamp(entry) {
        const fetchedAt = Date.parse(entry.snapshot && entry.snapshot.fetchedAt ? entry.snapshot.fetchedAt : '');
        if (Number.isFinite(fetchedAt)) {
          return fetchedAt;
        }
        return entry.savedAt;
      }

      function renderSnapshot(snapshot) {
        setStatus('', '');
        proposalList.innerHTML = '';
        resolvedList.innerHTML = '';
        tonviewerLink.href = snapshot.configContract.tonviewerUrl;
        proposalCounter.textContent = `${snapshot.proposalCount} live ${snapshot.proposalCount === 1 ? 'proposal' : 'proposals'}`;
        resolvedCounter.textContent = snapshot.resolvedProposal ? '1 remembered outcome' : '0 remembered outcomes';

        const roundEnds = formatTime(snapshot.validatorRound.currentSetEndsAt);
        const fetchedAt = formatTime(snapshot.fetchedAt);

        heroStats.innerHTML = [
          statCard('Live proposals', String(snapshot.proposalCount)),
          statCard('Validators', `${snapshot.validatorRound.totalValidators}`),
          statCard('Main validators', `${snapshot.validatorRound.mainValidators}`),
          statCard('Round threshold', '75%'),
        ].join('');

        const configAddress = snapshot.configContract.friendly;
        const shortConfigAddress = shortenMiddle(configAddress, 10, 8);

        heroMeta.innerHTML = [
          `<span>Config contract <a class="meta-link mono" href="${snapshot.configContract.tonviewerUrl}" target="_blank" rel="noreferrer" title="${escapeHtml(configAddress)}">${escapeHtml(shortConfigAddress)}</a></span>`,
          `<span>Validator round ends ${roundEnds}</span>`,
          `<span>Last pulled ${fetchedAt}</span>`,
        ].join('');

        footerNote.textContent =
          `Normal proposals need ${snapshot.votingRules.normal.min_wins} winning rounds. ` +
          `Critical proposals need ${snapshot.votingRules.critical.min_wins}. ` +
          `Data source: live mainnet config contract.`;

        renderResolvedSection(snapshot);

        if (!snapshot.proposals.length) {
          renderEmptyState(snapshot, roundEnds);
          return;
        }

        const fragment = document.createDocumentFragment();

        for (const proposal of snapshot.proposals) {
          const article = document.createElement('article');
          article.className = 'proposal';
          article.innerHTML = renderProposal(proposal, snapshot.validatorRound.totalValidators);
          fragment.appendChild(article);
        }

        proposalList.appendChild(fragment);
      }

      function renderEmptyState(snapshot, roundEnds) {
        setStatus('', '');
        statusNode.className = 'empty';
        statusNode.innerHTML = `
          <h3>No active config proposals right now</h3>
          <p>The dashboard is live. TON mainnet currently has zero open config proposals, so there are no active voting cards to show.</p>
          <div class="empty-grid">
            ${emptyMetric('Live proposals', String(snapshot.proposalCount))}
            ${emptyMetric('Validators', `${snapshot.validatorRound.totalValidators}`)}
            ${emptyMetric('Main validators', `${snapshot.validatorRound.mainValidators}`)}
            ${emptyMetric('Round ends', roundEnds)}
            ${emptyMetric('Normal wins needed', `${snapshot.votingRules.normal.min_wins}`)}
            ${emptyMetric('Critical wins needed', `${snapshot.votingRules.critical.min_wins}`)}
          </div>
        `;
      }

      function renderResolvedSection(snapshot) {
        if (!snapshot.resolvedProposal) {
          resolvedList.className = 'empty';
          resolvedList.innerHTML = '<p>No remembered resolved proposals yet.</p>';
          return;
        }

        resolvedList.className = '';
        resolvedList.innerHTML = renderResolvedProposal(snapshot.resolvedProposal);
      }

      function renderResolvedProposal(proposal) {
        const source = normalizeProposalSource(proposal.source);
        return `
          <div class="resolved-card">
            <div class="chips">
              ${renderProposalSourceChip(source)}
              <span class="chip good">Accepted</span>
              <span class="chip">Param ${proposal.paramId}</span>
            </div>
            <h4>${escapeHtml(proposal.paramLabel)}</h4>
            <p>${escapeHtml(proposal.summary)}</p>
            <p>${escapeHtml(proposal.closedBecause)}</p>
            <div class="change-grid">
              ${proposal.changeRows.map((row) => `
                <div class="change-row">
                  <div class="change-label"><strong>${escapeHtml(row.label)}</strong></div>
                  <div class="change-box">${escapeHtml(row.current)}</div>
                  <div class="change-box proposed">${escapeHtml(row.proposed)}</div>
                </div>
              `).join('')}
            </div>
            <div class="meta">
              <span>
                Proposal hash
                <button class="copy-hash" type="button" data-copy-value="${proposal.hash}">
                  <span class="mono">${proposal.hash.slice(0, 16)}…${proposal.hash.slice(-10)}</span>
                  <span class="copy-label">Copy</span>
                </button>
              </span>
            </div>
          </div>
        `;
      }

      function renderProposal(proposal, totalValidators) {
        const source = normalizeProposalSource(proposal.source);
        const severityClass = proposal.critical ? 'critical' : 'good';
        const severityLabel = proposal.critical ? 'Critical' : 'Non-critical';
        const deadline = formatTime(proposal.expiresAt);
        const metrics = [
          metricCard('Voted validators', `${proposal.voterCount} / ${totalValidators}`),
          metricCard(
            'Min validators needed',
            formatNeededValidatorCount(proposal.neededValidatorCount),
            'Minimum additional validators needed if the largest remaining validators vote first.'
          ),
          metricCard('Weight in favor', `${proposal.yesPercentOfTotal}% of total`),
          metricCard('Needed this round', `${proposal.neededPercentOfTotal}% more`),
          metricCard('Round wins', `${proposal.wins} / ${proposal.rule.min_wins}`),
          metricCard('Losses', `${proposal.losses} / ${proposal.rule.max_losses}`),
          metricCard('Rounds left', `${proposal.roundsRemaining}`),
        ].join('');

        const changes = proposal.changeRows
          ? `
            <div class="change-grid">
              ${proposal.changeRows.map((row) => `
                <div class="change-row">
                  <div class="change-label"><strong>${escapeHtml(row.label)}</strong></div>
                  <div class="change-box">${escapeHtml(row.current)}</div>
                  <div class="change-box proposed">${escapeHtml(row.proposed)}</div>
                </div>
              `).join('')}
            </div>
          `
          : '';

        return `
          <div class="proposal-head">
            <div>
              <p class="eyebrow">Param ${proposal.paramId}</p>
              <h3 class="proposal-title">${escapeHtml(proposal.paramLabel)}</h3>
            </div>
            <div class="chips">
              ${renderProposalSourceChip(source)}
              <span class="chip ${severityClass}">${severityLabel}</span>
              <span class="chip">${proposal.validatorSetMatchesCurrent ? 'Current validator set' : 'Awaiting set rollover'}</span>
              <span class="chip">Deadline ${deadline}</span>
            </div>
          </div>

          <p class="summary">${escapeHtml(proposal.summary)}</p>

          <div class="progress-panel">
            <div class="progress-top">
              <span>Current round progress</span>
              <strong>${proposal.yesPercentOfTotal}% of total validator weight</strong>
            </div>
            <div class="progress-track">
              <div class="progress-fill" style="width: ${proposal.yesPercentOfTotal}%"></div>
              <div class="progress-threshold" aria-hidden="true"></div>
            </div>
            <div class="progress-threshold-label">
              <span class="progress-threshold-dot" aria-hidden="true"></span>
              <span>Threshold at 75% of total validator weight</span>
            </div>
            <div class="metric-grid">${metrics}</div>
          </div>

          ${changes}

          <div class="meta">
            <span>
              Proposal hash
              <button class="copy-hash" type="button" data-copy-value="${proposal.hash}">
                <span class="mono">${proposal.hash.slice(0, 16)}…${proposal.hash.slice(-10)}</span>
                <span class="copy-label">Copy</span>
              </button>
            </span>
            <span>Expires ${deadline}</span>
          </div>
        `;
      }

      function statCard(label, value) {
        return `
          <div class="stat">
            <span class="stat-label">${label}</span>
            <strong class="stat-value">${value}</strong>
          </div>
        `;
      }

      function metricCard(label, value, tooltip) {
        const info = tooltip
          ? `<span class="info-dot" tabindex="0" aria-label="${escapeHtml(tooltip)}" data-tooltip="${escapeHtml(tooltip)}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9.25"></circle><path d="M9.6 9.2a2.55 2.55 0 0 1 4.85 1.1c0 1.85-2.45 2.25-2.45 3.7"></path><path d="M12 17.25h.01"></path></svg></span>`
          : '';
        return `
          <div class="metric">
            <span class="label">${label}${info}</span>
            <span class="value">${value}</span>
          </div>
        `;
      }

      function emptyMetric(label, value) {
        return `
          <div class="empty-metric">
            <span class="label">${label}</span>
            <span class="value">${value}</span>
          </div>
        `;
      }

      function setStatus(message, kind) {
        if (!message) {
          statusNode.innerHTML = '';
          statusNode.className = '';
          return;
        }
        statusNode.className = kind;
        statusNode.textContent = message;
      }

      async function copyText(value) {
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(value);
            return true;
          }
        } catch (error) {
        }

        try {
          const input = document.createElement('textarea');
          input.value = value;
          input.setAttribute('readonly', '');
          input.style.position = 'absolute';
          input.style.left = '-9999px';
          document.body.appendChild(input);
          input.select();
          const copied = document.execCommand('copy');
          document.body.removeChild(input);
          return copied;
        } catch (error) {
          return false;
        }
      }

      function formatTime(input) {
        const date = typeof input === 'string' ? new Date(input) : new Date(input * 1000);
        const absolute = new Intl.DateTimeFormat('en-US', {
          timeZone: 'UTC',
          month: 'short',
          day: 'numeric',
          year: 'numeric',
          hour: '2-digit',
          minute: '2-digit',
          hour12: false,
          timeZoneName: 'short',
        }).format(date);
        const relative = formatRelative(date);
        return `${absolute} (${relative})`;
      }

      function formatRelative(date) {
        const diffMs = date.getTime() - Date.now();
        const diffMinutes = Math.round(diffMs / 60000);
        if (Math.abs(diffMinutes) < 1) {
          return 'now';
        }
        if (Math.abs(diffMinutes) < 60) {
          return relativeLabel(diffMinutes, 'minute');
        }
        const diffHours = Math.round(diffMinutes / 60);
        if (Math.abs(diffHours) < 48) {
          return relativeLabel(diffHours, 'hour');
        }
        const diffDays = Math.round(diffHours / 24);
        return relativeLabel(diffDays, 'day');
      }

      function relativeLabel(amount, unit) {
        const abs = Math.abs(amount);
        const plural = abs === 1 ? unit : `${unit}s`;
        return amount > 0 ? `in ${abs} ${plural}` : `${abs} ${plural} ago`;
      }

      function formatNeededValidatorCount(count) {
        if (typeof count !== 'number') {
          return 'After set rollover';
        }
        return `${count} more`;
      }

      function shortenMiddle(value, startLength, endLength) {
        const text = String(value);
        if (text.length <= startLength + endLength + 1) {
          return text;
        }
        return `${text.slice(0, startLength)}…${text.slice(-endLength)}`;
      }

      function normalizeProposalSource(source) {
        if (source && source.kind === 'mtonga') {
          return {
            kind: 'mtonga',
            label: 'MTONGA plan',
          };
        }

        return {
          kind: 'independent',
          label: 'Independent community proposal',
        };
      }

      function renderProposalSourceChip(source) {
        const label = escapeHtml(source.label);
        if (source.kind === 'mtonga') {
          return `<a class="chip mtonga" href="${MTONGA_PLAN_URL}" target="_blank" rel="noreferrer">${label}</a>`;
        }

        return `<span class="chip independent">${label}</span>`;
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }
    </script>
  </body>
</html>
